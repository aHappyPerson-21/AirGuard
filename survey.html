<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Indoor Air Quality Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: linear-gradient(135deg, #e0f2ff, #f7fbff);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 30px;
    }

    .container {
        width: 100%;
        max-width: 900px;
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 12px 35px rgba(0,0,0,0.12);
    }

    h1 {
        text-align: center;
        margin-bottom: 10px;
        color: #0f172a;
    }

    .subtitle {
        text-align: center;
        color: #64748b;
        margin-bottom: 30px;
    }

    .question {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 8px;
        font-weight: 500;
    }

    input, select {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #cbd5e1;
        font-size: 15px;
        outline: none;
    }

    input:focus, select:focus {
        border-color: #00a6ff;
    }

    button {
        width: 100%;
        padding: 15px;
        margin-top: 15px;
        background: #00a6ff;
        border: none;
        color: white;
        font-size: 17px;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
    }

    button:hover {
        background: #0086d1;
    }

    .result {
        margin-top: 25px;
        padding: 25px;
        border-radius: 15px;
        display: none;
    }

    .good { background: #dcfce7; color: #166534; }
    .moderate { background: #fef9c3; color: #854d0e; }
    .bad { background: #fee2e2; color: #991b1b; }

    .tips {
        margin-top: 15px;
    }

    ul {
        margin-top: 10px;
        padding-left: 20px;
        line-height: 1.7;
    }
</style>
</head>

<body>

<div class="container">

<h1>Smart Indoor Air Quality Analyzer</h1>
<p class="subtitle">Science-based estimation model (ventilation, exposure, pollutants)</p>

<div class="question">
<label>People in room</label>
<input type="number" id="people">
</div>

<div class="question">
<label>Window ventilation</label>
<select id="windows">
<option value="3">Often (good airflow)</option>
<option value="2">Sometimes</option>
<option value="1">Rarely</option>
<option value="0">Never</option>
</select>
</div>

<div class="question">
<label>Smoking indoors</label>
<select id="smoke">
<option value="0">No</option>
<option value="4">Yes</option>
</select>
</div>

<div class="question">
<label>Dust level</label>
<select id="dust">
<option value="0">Low</option>
<option value="2">Medium</option>
<option value="4">High</option>
</select>
</div>

<div class="question">
<label>Air purifier</label>
<select id="purifier">
<option value="-3">Yes (active filtration)</option>
<option value="0">No</option>
</select>
</div>

<div class="question">
<label>Mold / humidity issue</label>
<select id="mold">
<option value="0">No</option>
<option value="4">Yes</option>
</select>
</div>

<div class="question">
<label>Hours room is occupied daily</label>
<input type="number" id="hours">
</div>

<button onclick="analyzeAir()">Analyze Air Quality</button>

<div id="result" class="result">
<h2 id="title"></h2>
<p id="text"></p>

<div class="tips">
<strong>Improvement actions:</strong>
<ul id="tips"></ul>
</div>
</div>

</div>

<script>

function analyzeAir() {

    const people = +document.getElementById("people").value || 0;
    const windows = +document.getElementById("windows").value;
    const smoke = +document.getElementById("smoke").value;
    const dust = +document.getElementById("dust").value;
    const purifier = +document.getElementById("purifier").value;
    const mold = +document.getElementById("mold").value;
    const hours = +document.getElementById("hours").value || 0;

    // -----------------------------
    // SCIENCE-INSPIRED MODEL
    // -----------------------------

    let score = 0;

    // CO₂ accumulation risk (occupancy + time)
    const occupancyRisk = (people * 0.6) + (hours * 0.2);
    score += occupancyRisk;

    // Ventilation (major factor)
    score += (3 - windows) * 3;

    // Pollution sources
    score += smoke * 5;
    score += dust * 2.5;
    score += mold * 4;

    // Air cleaning effect
    score += purifier;

    // Clamp score
    score = Math.max(0, score);

    // -----------------------------
    // RESULT CLASSIFICATION
    // -----------------------------

    const result = document.getElementById("result");
    const title = document.getElementById("title");
    const text = document.getElementById("text");
    const tips = document.getElementById("tips");

    tips.innerHTML = "";
    result.style.display = "block";

    function addTip(t) {
        const li = document.createElement("li");
        li.innerText = t;
        tips.appendChild(li);
    }

    // CO₂-style interpretation thresholds
    if (score <= 6) {

        result.className = "result good";
        title.innerText = "🟢 Good Indoor Air Quality";

        text.innerText =
        "Low pollutant load and good ventilation patterns. Conditions are generally healthy.";

        addTip("Keep natural ventilation consistent.");
        addTip("Maintain regular cleaning routines.");
        addTip("Avoid unnecessary indoor pollution sources.");

    } 
    else if (score <= 14) {

        result.className = "result moderate";
        title.innerText = "🟡 Moderate Air Quality";

        text.innerText =
        "Some accumulation of pollutants or limited ventilation detected.";

        addTip("Increase window ventilation frequency.");
        addTip("Reduce occupancy time in closed rooms.");
        addTip("Consider adding an air purifier.");
        addTip("Control humidity to prevent mold growth.");

    } 
    else {

        result.className = "result bad";
        title.innerText = "🔴 Poor Indoor Air Quality";

        text.innerText =
        "High pollutant risk detected. Conditions may impact health and comfort.";

        addTip("Immediately improve ventilation (open windows).");
        addTip("Remove or stop smoking indoors.");
        addTip("Deep clean dust and mold sources.");
        addTip("Use HEPA filtration if available.");
        addTip("Reduce room overcrowding.");
    }
}

</script>

</body>
</html>
