<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Scientific Indoor Air Quality Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#e0f2ff,#f8fbff);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:100%;
    max-width:950px;
    background:white;
    border-radius:22px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:#0f172a;
}

.subtitle{
    text-align:center;
    color:#64748b;
    margin-bottom:35px;
}

.question{
    margin-bottom:20px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
}

input,select{
    width:100%;
    padding:13px;
    border-radius:12px;
    border:1px solid #cbd5e1;
    font-size:15px;
    outline:none;
}

input:focus,select:focus{
    border-color:#0ea5e9;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:14px;
    background:#0ea5e9;
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#0284c7;
}

.result{
    margin-top:30px;
    padding:30px;
    border-radius:18px;
    display:none;
}

.good{
    background:#dcfce7;
    color:#166534;
}

.moderate{
    background:#fef9c3;
    color:#854d0e;
}

.bad{
    background:#fee2e2;
    color:#991b1b;
}

.verybad{
    background:#7f1d1d;
    color:white;
}

.metrics{
    margin-top:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:15px;
}

.metric{
    background:rgba(255,255,255,0.6);
    padding:15px;
    border-radius:12px;
}

.metric h3{
    font-size:14px;
    margin-bottom:5px;
}

.metric p{
    font-size:20px;
    font-weight:600;
}

ul{
    margin-top:12px;
    padding-left:20px;
    line-height:1.8;
}

</style>
</head>

<body>

<div class="container">

<h1>Scientific Indoor Air Quality Analyzer</h1>

<p class="subtitle">
Realistic estimation using occupancy density, CO₂ buildup,
ventilation rate (ACH), humidity, pollutants, and filtration.
</p>

<div class="question">
<label>People in room</label>
<input type="number" id="people" min="1">
</div>

<div class="question">
<label>Room area (m²)</label>
<input type="number" id="area" min="1">
</div>

<div class="question">
<label>Ceiling height (m)</label>
<input type="number" id="height" value="2.7" step="0.1">
</div>

<div class="question">
<label>Hours occupied daily</label>
<input type="number" id="hours" min="1">
</div>

<div class="question">
<label>Window ventilation</label>
<select id="windows">
<option value="6">Often (strong airflow)</option>
<option value="3">Sometimes</option>
<option value="1">Rarely</option>
<option value="0.3">Never / sealed room</option>
</select>
</div>

<div class="question">
<label>Mechanical HVAC ventilation</label>
<select id="hvac">
<option value="3">Good HVAC ventilation</option>
<option value="1.5">Weak HVAC</option>
<option value="0">None</option>
</select>
</div>

<div class="question">
<label>Indoor smoking</label>
<select id="smoke">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="question">
<label>Dust level</label>
<select id="dust">
<option value="0">Low</option>
<option value="1">Moderate</option>
<option value="2">High</option>
</select>
</div>

<div class="question">
<label>Air purifier</label>
<select id="purifier">
<option value="1">Yes (HEPA / active filtration)</option>
<option value="0">No</option>
</select>
</div>

<div class="question">
<label>Humidity (%)</label>
<input type="number" id="humidity" min="10" max="100">
</div>

<div class="question">
<label>Mold / moisture issue</label>
<select id="mold">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<button onclick="analyzeAir()">
Analyze Indoor Air Quality
</button>

<div id="result" class="result">

<h2 id="title"></h2>

<p id="summary"></p>

<div class="metrics">

<div class="metric">
<h3>Estimated CO₂</h3>
<p id="co2"></p>
</div>

<div class="metric">
<h3>Ventilation Rate</h3>
<p id="ach"></p>
</div>

<div class="metric">
<h3>Occupancy Density</h3>
<p id="density"></p>
</div>

<div class="metric">
<h3>PM / Pollutant Risk</h3>
<p id="pmrisk"></p>
</div>

</div>

<div style="margin-top:25px;">
<strong>Improvement Actions:</strong>
<ul id="tips"></ul>
</div>

</div>

</div>

<script>

function analyzeAir(){

    const people =
        +document.getElementById("people").value || 1;

    const area =
        +document.getElementById("area").value || 20;

    const height =
        +document.getElementById("height").value || 2.7;

    const hours =
        +document.getElementById("hours").value || 1;

    const windowACH =
        +document.getElementById("windows").value;

    const hvacACH =
        +document.getElementById("hvac").value;

    const smoke =
        +document.getElementById("smoke").value;

    const dust =
        +document.getElementById("dust").value;

    const purifier =
        +document.getElementById("purifier").value;

    const humidity =
        +document.getElementById("humidity").value || 50;

    const mold =
        +document.getElementById("mold").value;

    // -----------------------------
    // ROOM PHYSICS
    // -----------------------------

    const roomVolume = area * height;

    // Total ACH (air changes per hour)

    let ach = windowACH + hvacACH;

    // purifier adds some equivalent clean air delivery

    if(purifier){
        ach += 1.5;
    }

    ach = Math.max(0.3, ach);

    // -----------------------------
    // OCCUPANCY DENSITY
    // persons per square meter
    // -----------------------------

    const occupancyDensity = people / area;

    // -----------------------------
    // ESTIMATED CO₂ MODEL
    // Educational approximation
    // -----------------------------

    let estimatedCO2 =
        420 +
        ((people * hours * 18) / (roomVolume * ach)) * 1000;

    // heavy overcrowding penalty

    if(occupancyDensity > 0.5){
        estimatedCO2 += 250;
    }

    if(occupancyDensity > 1){
        estimatedCO2 += 500;
    }

    // -----------------------------
    // PARTICLE / POLLUTION SCORE
    // -----------------------------

    let pollutionScore = 0;

    // smoking massively increases PM2.5

    if(smoke){
        pollutionScore += 5;
        estimatedCO2 += 600;
    }

    pollutionScore += dust * 1.5;

    if(mold){
        pollutionScore += 3;
    }

    // humidity outside healthy range

    if(humidity > 60 || humidity < 30){
        pollutionScore += 2;
    }

    // purifier mitigation

    if(purifier){
        pollutionScore -= 2;
    }

    pollutionScore = Math.max(0, pollutionScore);

    // -----------------------------
    // CLASSIFICATION
    // -----------------------------

    let category = "";
    let summary = "";
    let className = "";

    // Combined evaluation

    let finalRisk = 0;

    // CO₂ contribution

    if(estimatedCO2 < 800){
        finalRisk += 0;
    }
    else if(estimatedCO2 < 1000){
        finalRisk += 1;
    }
    else if(estimatedCO2 < 1400){
        finalRisk += 2;
    }
    else if(estimatedCO2 < 2000){
        finalRisk += 4;
    }
    else{
        finalRisk += 6;
    }

    finalRisk += pollutionScore;

    if(ach < 1){
        finalRisk += 2;
    }

    // -----------------------------
    // RESULT OUTPUT
    // -----------------------------

    if(finalRisk <= 2){

        category = "🟢 Excellent Indoor Air Quality";
        className = "result good";

        summary =
        "Ventilation and pollutant conditions appear healthy with low estimated contaminant accumulation.";

    }
    else if(finalRisk <= 5){

        category = "🟡 Moderate Indoor Air Quality";
        className = "result moderate";

        summary =
        "Some pollutant accumulation or reduced ventilation detected. Conditions are acceptable but could be improved.";

    }
    else if(finalRisk <= 8){

        category = "🔴 Poor Indoor Air Quality";
        className = "result bad";

        summary =
        "Elevated CO₂ buildup or pollutant exposure may reduce comfort, concentration, and respiratory quality.";

    }
    else{

        category = "⚠️ Very Poor Indoor Air Quality";
        className = "result verybad";

        summary =
        "High pollutant and ventilation risk detected. Long exposure may negatively affect health and cognitive performance.";

    }

    // -----------------------------
    // DISPLAY
    // -----------------------------

    const result =
        document.getElementById("result");

    result.style.display = "block";
    result.className = className;

    document.getElementById("title").innerText =
        category;

    document.getElementById("summary").innerText =
        summary;

    document.getElementById("co2").innerText =
        Math.round(estimatedCO2) + " ppm";

    document.getElementById("ach").innerText =
        ach.toFixed(1) + " ACH";

    document.getElementById("density").innerText =
        occupancyDensity.toFixed(2) + " ppl/m²";

    // PM Risk label

    let pmLabel = "Low";

    if(pollutionScore >= 3){
        pmLabel = "Moderate";
    }

    if(pollutionScore >= 6){
        pmLabel = "High";
    }

    document.getElementById("pmrisk").innerText =
        pmLabel;

    // -----------------------------
    // DYNAMIC RECOMMENDATIONS
    // -----------------------------

    const tips =
        document.getElementById("tips");

    tips.innerHTML = "";

    function addTip(t){
        const li = document.createElement("li");
        li.innerText = t;
        tips.appendChild(li);
    }

    if(estimatedCO2 > 1000){
        addTip("Increase outdoor air ventilation to reduce CO₂ buildup.");
    }

    if(ach < 2){
        addTip("Improve air exchange rate (ACH) using windows or HVAC.");
    }

    if(smoke){
        addTip("Stop indoor smoking immediately.");
    }

    if(dust >= 1){
        addTip("Reduce dust accumulation using HEPA vacuum cleaning.");
    }

    if(mold){
        addTip("Address mold and moisture sources quickly.");
    }

    if(humidity > 60){
        addTip("Reduce humidity below 60% to prevent microbial growth.");
    }

    if(humidity < 30){
        addTip("Increase humidity to avoid dry air irritation.");
    }

    if(occupancyDensity > 0.5){
        addTip("Reduce room overcrowding or increase room ventilation.");
    }

    if(!purifier && finalRisk >= 5){
        addTip("Consider adding a HEPA air purifier.");
    }

    if(finalRisk <= 2){
        addTip("Current indoor air conditions appear well controlled.");
    }

}

</script>

</body>
</html>
